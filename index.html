<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bruong</title>
    <!-- Подключение стильных иконок Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Общие настройки и обнуление */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированный неоновый шар на фоне */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.6) 0%, rgba(0, 0, 0, 0) 70%);
            top: -50px;
            left: -50px;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: floatBall 15s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes floatBall {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(60vw, 40vh) scale(1.3);
            }
            100% {
                transform: translate(20vw, 80vh) scale(0.9);
            }
        }

        /* Основной контейнер сайта */
        .main-container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-top: auto;
            margin-bottom: auto;
            z-index: 1;
        }

        /* Левая колонка (Профиль и Инфо) */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Блок профиля (Аватар + Ник) */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        .nickname {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        /* Базовый стиль для карточек */
        .card {
            background: rgba(18, 18, 24, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a0aec0;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        /* Информационные строки */
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #718096;
        }

        .info-value {
            color: #ffffff;
            font-weight: 500;
        }

        /* Правая колонка (Ссылки) */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Ссылки/Кнопки */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 30, 40, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .social-link:last-child {
            margin-bottom: 0;
        }

        .social-link:hover {
            background: rgba(138, 43, 226, 0.15);
            border-color: #8a2be2;
            box-shadow: 0 0 12px rgba(138, 43, 226, 0.2);
            transform: translateY(-2px);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .link-left i {
            font-size: 1.2rem;
            color: #8a2be2;
        }

        .social-link i.fa-external-link-alt {
            font-size: 0.85rem;
            color: #4a5568;
            transition: color 0.3s;
        }

        .social-link:hover i.fa-external-link-alt {
            color: #8a2be2;
        }

        /* Футер */
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #4a5568;
            z-index: 1;
        }

        /* Адаптивность под мобильные устройства */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .nickname {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Размытый неоновый шар -->
    <div class="bg-glow"></div>

    <!-- Основной контент -->
    <main class="main-container">
        
        <!-- Левая часть: Профиль и Инфо -->
        <div class="left-column">
            <div class="profile-card">
                <!-- Прямая ссылка на твою аватарку с ImgBB -->
                <img src="https://i.ibb.co/F41KR2Lz/9376.jpg" alt="bruong" class="avatar">
                <h1 class="nickname">bruong</h1>
            </div>

            <div class="card">
                <div class="card-title">INFO BRUONG</div>
                <div class="info-body">
                    <div class="info-row">
                        <span class="info-label">Name:</span>
                        <span class="info-value">Bruong</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Age:</span>
                        <span class="info-value">?</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Time zone:</span>
                        <span class="info-value">UTC +3</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Birthday:</span>
                        <span class="info-value">22 September</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая часть: Социальные сети -->
        <div class="right-column">
            <div class="card">
                <div class="card-title">SOCIAL LINKS</div>
                
                <a href="https://t.me/bruong" target="_blank" class="social-link">
                    <div class="link-left">
                        <i class="fab fa-telegram-plane"></i>
                        <span>Telegram</span>
                    </div>
                    <i class="fas fa-external-link-alt"></i>
                </a>

                <a href="https://t.me/adapterbruong" target="_blank" class="social-link">
                    <div class="link-left">
                        <i class="fas fa-bullhorn"></i>
                        <span>Telegram Channel</span>
                    </div>
                    <i class="fas fa-external-link-alt"></i>
                </a>

            </div>
        </div>

    </main>

    <!-- Подвал сайта -->
    <footer>
        © bruong 2026
    </footer>

</body>
</html>
